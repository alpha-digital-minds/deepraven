<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepRaven Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --sidebar-w: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }
    header .logo { height: 32px; width: auto; mix-blend-mode: multiply; }
    header h1 { font-size: 16px; font-weight: 700; }
    header .spacer { flex: 1; }
    header .account-info { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .btn-sm {
      padding: 4px 10px; border-radius: 5px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); transition: background .12s;
    }
    .btn-sm:hover { background: var(--border); }
    .btn-sm.primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-sm.primary:hover { background: var(--primary-dark); }
    .btn-sm.danger { color: var(--red); border-color: #fecaca; }
    .btn-sm.danger:hover { background: #fef2f2; }
    .btn-sm:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Login screen ── */
    #login-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 36px 32px; width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo img { height: 56px; mix-blend-mode: multiply; }
    .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .login-card .sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .form-group input {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 14px; outline: none; background: var(--bg);
    }
    .form-group input:focus { border-color: var(--primary); background: #fff; }
    .form-group input.error { border-color: var(--red); }
    .login-btn {
      width: 100%; padding: 10px; background: var(--primary); color: white;
      border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: background .12s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-btn:disabled { opacity: .55; cursor: not-allowed; }
    .login-switch { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
    .login-switch a { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 500; }
    .login-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }
    .login-ok { color: var(--green); font-size: 12px; margin-top: 8px; text-align: center; }
    .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 12px; font-size: 12px; }
    .forgot-link a { color: var(--primary); cursor: pointer; text-decoration: none; }

    /* ── App layout ── */
    #app-layout { display: none; flex: 1; overflow: hidden; }
    #app-layout.visible { display: flex; }

    /* ── Project picker (header dropdown) ── */
    .proj-picker {
      position: relative;
    }
    .proj-picker-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 13px; font-weight: 600; color: var(--text);
      max-width: 200px;
    }
    .proj-picker-btn:hover { background: var(--border); }
    .proj-picker-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .proj-picker-arrow { font-size: 10px; opacity: .5; flex-shrink: 0; }
    .proj-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12);
      min-width: 220px; z-index: 200; overflow: hidden;
    }
    .proj-dropdown.open { display: block; }
    .proj-dd-item {
      padding: 9px 14px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      color: var(--text); font-weight: 500;
    }
    .proj-dd-item:hover { background: var(--bg); }
    .proj-dd-item.active { color: var(--primary); background: #eef2ff; }
    .proj-dd-item.proj-dd-new { color: var(--primary); font-weight: 600; }
    .proj-dd-sep { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── Sidebar (contacts + project nav) ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
    }
    .contacts-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .contacts-header .label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 8px;
    }
    /* ── Sidebar project nav (bottom) ── */
    .sidebar-proj-nav {
      border-top: 1px solid var(--border);
      padding: 6px;
      flex-shrink: 0;
    }
    .spn-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      padding: 4px 8px 6px;
    }
    .spn-item {
      padding: 8px 10px; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      transition: background .1s, color .1s;
    }
    .spn-item:hover { background: var(--bg); color: var(--text); }
    .spn-item.active { background: #eef2ff; color: var(--primary); }
    .search {
      width: 100%; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; background: var(--bg); outline: none;
    }
    .search:focus { border-color: var(--primary); }
    .contacts-list { flex: 1; overflow-y: auto; padding: 6px; }
    .contact-card {
      padding: 10px 11px; border-radius: 8px; cursor: pointer;
      border: 2px solid transparent; margin-bottom: 3px;
      transition: background .1s, border-color .1s;
    }
    .contact-card:hover { background: var(--bg); }
    .contact-card.active { border-color: var(--primary); background: #eef2ff; }
    .cc-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cc-id { font-size: 11px; color: var(--muted); font-family: monospace; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; }
    .cc-badges { display: flex; flex-wrap: wrap; gap: 3px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 500;
      padding: 2px 7px; border-radius: 20px;
    }
    .b-gray   { background: #f1f5f9; color: #475569; }
    .b-blue   { background: #eff6ff; color: #2563eb; }
    .b-green  { background: #f0fdf4; color: var(--green); }
    .b-amber  { background: #fffbeb; color: var(--amber); }
    .b-purple { background: #f5f3ff; color: #7c3aed; }

    /* ── Main panel ── */
    main {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 12px;
    }
    .empty-state img { height: 160px; opacity: .85; }
    .empty-state p { font-size: 15px; }

    /* ── Detail header ── */
    .detail-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 22px 0; flex-shrink: 0;
    }
    .dh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .dh-name { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .dh-id { font-size: 11px; font-family: monospace; color: var(--muted); }
    .dh-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-top: 5px; }
    .dh-actions { display: flex; gap: 6px; align-items: center; }

    /* ── Tabs ── */
    .tabs { display: flex; }
    .tab {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      color: var(--muted); transition: color .12s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { border-bottom-color: var(--primary); color: var(--primary); }

    /* ── Tab content ── */
    .tab-content { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ── Profile grid ── */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .persona-card {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155; border-radius: 10px; padding: 16px 18px;
    }
    .persona-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #64748b; margin-bottom: 8px;
    }
    .persona-text {
      font-size: 13.5px; line-height: 1.65; color: #e2e8f0; font-weight: 400;
    }
    .persona-empty { color: #475569; font-style: italic; font-size: 13px; }
    .relative-item {
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .relative-item:last-child { border-bottom: none; }
    .relative-relation {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--primary); margin-bottom: 4px;
    }
    .relative-attrs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .relative-attr {
      font-size: 11px; padding: 2px 7px; background: #f1f5f9;
      border-radius: 20px; color: #475569;
    }
    .relative-attr.size-attr { background: #ede9fe; color: #5b21b6; }
    .relative-notes { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }
    .pcard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    .pcard-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 10px;
    }
    .field { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; border-bottom: 1px solid #f8fafc; font-size: 13px; }
    .field:last-child { border-bottom: none; }
    .field.col { flex-direction: column; gap: 4px; }
    .fl { color: var(--muted); min-width: 90px; flex-shrink: 0; font-size: 12px; }
    .fv { font-weight: 500; }
    .fv.empty { color: #cbd5e1; font-style: italic; font-weight: 400; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 12px; padding: 3px 8px; background: #f1f5f9; border-radius: 20px; }

    /* ── Conversations ── */
    .convo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 10px; overflow: hidden;
      border-left-width: 3px;
    }
    .convo-card.is-processed   { border-left-color: var(--green); }
    .convo-card.is-unprocessed { border-left-color: var(--amber); }
    .convo-header {
      padding: 7px 13px; background: #f8fafc; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
    }
    .convo-header .spacer { flex: 1; }
    .convo-pending {
      padding: 6px 13px 8px; font-size: 11px; color: var(--amber);
      background: #fffbeb; border-top: 1px solid #fef3c7;
      display: flex; align-items: center; gap: 5px;
    }
    .convo-msgs { padding: 10px 13px; display: flex; flex-direction: column; gap: 6px; }
    .msg {
      padding: 7px 10px; border-radius: 8px; font-size: 13px;
      max-width: 82%; line-height: 1.4; position: relative;
    }
    .msg-role { font-size: 10px; font-weight: 700; opacity: .55; text-transform: uppercase; margin-bottom: 2px; }
    .msg-user      { background: #eef2ff; color: #3730a3; align-self: flex-end; }
    .msg-assistant { background: #f8fafc; color: var(--text); border: 1px solid var(--border); }
    .msg-system    { background: #fffbeb; color: #78350f; font-size: 12px; }
    .msg-status {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 5px; border-radius: 3px; margin-top: 4px;
    }
    .msg-status-ok      { background: #f0fdf4; color: var(--green); }
    .msg-status-pending { background: #fffbeb; color: var(--amber); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--surface); border-radius: 12px;
      padding: 24px 26px 22px; width: 640px; max-width: 96vw;
      box-shadow: 0 8px 40px rgba(0,0,0,.18); max-height: 88vh; overflow-y: auto;
    }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 18px; margin-top: 12px; }
    .modal-tab {
      padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; color: var(--muted); margin-bottom: -1px;
    }
    .modal-tab:hover { color: var(--text); }
    .modal-tab.active { border-bottom-color: var(--primary); color: var(--primary); }
    .modal-pane { display: none; }
    .modal-pane.active { display: block; }
    .modal-section { margin-bottom: 20px; }
    .modal-section h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .inline-form { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .inline-form input {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none;
    }
    .inline-form input:focus { border-color: var(--primary); }
    .key-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #f8fafc; font-size: 13px;
    }
    .key-row:last-child { border-bottom: none; }
    .key-name { font-weight: 500; }
    .key-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .key-revoked { opacity: .4; text-decoration: line-through; }
    .new-key-box {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 10px; font-size: 12px; color: #166534;
    }
    .new-key-box code { font-family: monospace; font-size: 13px; word-break: break-all; }
    /* Integration guide styles */
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 12px; margin-bottom: 8px; gap: 10px;
    }
    .info-row .info-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .info-row .info-val { font-family: monospace; font-size: 13px; word-break: break-all; }
    .copy-btn {
      flex-shrink: 0; padding: 4px 10px; border-radius: 5px; font-size: 11px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); transition: all .12s;
    }
    .copy-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .snippet-tabs { display: flex; gap: 2px; margin-bottom: 0; }
    .snippet-tab {
      padding: 5px 12px; font-size: 12px; font-weight: 500; cursor: pointer;
      border-radius: 6px 6px 0 0; color: var(--muted); background: #f1f5f9;
    }
    .snippet-tab.active { background: #1e293b; color: white; }
    .code-block {
      background: #1e293b; color: #e2e8f0; border-radius: 0 6px 6px 6px;
      padding: 14px 16px; font-family: monospace; font-size: 12px; line-height: 1.6;
      white-space: pre; overflow-x: auto; margin-bottom: 12px;
    }

    /* ── Project overview ── */
    .project-overview { display:flex; flex-direction:column; height:100%; overflow:hidden; }
    .po-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 22px 26px 0; flex-shrink: 0;
    }
    .po-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .po-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .po-body { flex: 1; overflow-y: auto; padding: 22px 26px; }
    .po-section { max-width: 620px; margin-bottom: 28px; }
    .po-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: 12px;
    }
    .new-key-reveal {
      background: #f0fdf4; border: 1px solid #86efac;
      border-radius: 9px; padding: 14px 16px; margin-top: 12px;
    }
    .new-key-reveal .nkr-title {
      font-size: 13px; font-weight: 600; color: #166534; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .new-key-val {
      display: flex; align-items: center; gap: 10px;
      background: #dcfce7; border-radius: 6px; padding: 9px 12px;
    }
    .new-key-val code { flex: 1; font-family: monospace; font-size: 13px; word-break: break-all; color: #15803d; }
    .danger-box {
      border: 1px solid #fecaca; border-radius: 9px; padding: 16px;
      background: #fff5f5;
    }
    .danger-box p { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
    .gdpr-section {
      grid-column: 1 / -1; border: 1px solid #fecaca; border-radius: 10px;
      padding: 14px 16px; background: #fff5f5;
    }
    .gdpr-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #dc2626; margin-bottom: 10px;
    }
    .gdpr-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .gdpr-actions .btn-danger {
      font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #fca5a5;
      background: white; color: #dc2626; cursor: pointer; font-weight: 500;
    }
    .gdpr-actions .btn-danger:hover { background: #fef2f2; }
    .gdpr-actions .btn-danger.destructive { background: #dc2626; color: white; border-color: #dc2626; }
    .gdpr-actions .btn-danger.destructive:hover { background: #b91c1c; }
    .btn-action {
      font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #6366f1;
      background: white; color: #6366f1; cursor: pointer; font-weight: 500;
    }
    .btn-action:hover { background: #eef2ff; }

    /* ── Home dashboard ── */
    .home-panel { flex:1; overflow-y:auto; padding:28px 30px; }
    .home-title { font-size:20px; font-weight:700; margin-bottom:4px; }
    .home-sub   { font-size:13px; color:var(--muted); margin-bottom:28px; }
    .stat-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .stat-card  {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:18px 20px;
    }
    .stat-card .sc-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:8px; }
    .stat-card .sc-value { font-size:28px; font-weight:700; line-height:1; }
    .stat-card .sc-sub   { font-size:12px; color:var(--muted); margin-top:4px; }
    .sc-blue   { border-top:3px solid #6366f1; }
    .sc-green  { border-top:3px solid #16a34a; }
    .sc-amber  { border-top:3px solid #d97706; }
    .sc-purple { border-top:3px solid #7c3aed; }
    .home-section { margin-bottom:28px; }
    .home-section-title {
      font-size:13px; font-weight:700; color:var(--text);
      margin-bottom:14px; display:flex; align-items:center; gap:8px;
    }
    .chart-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px 22px;
    }
    .usage-table {
      width:100%; border-collapse:collapse; font-size:13px;
    }
    .usage-table th {
      text-align:left; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.06em;
      color:var(--muted); padding:0 12px 10px; border-bottom:1px solid var(--border);
    }
    .usage-table th:not(:first-child) { text-align:right; }
    .usage-table td {
      padding:10px 12px; border-bottom:1px solid #f8fafc; vertical-align:middle;
    }
    .usage-table td:not(:first-child) { text-align:right; }
    .usage-table tr:last-child td { border-bottom:none; }
    .usage-table .proj-name { font-weight:600; }
    .usage-bar-wrap { display:flex; align-items:center; gap:8px; justify-content:flex-end; }
    .usage-bar { height:6px; border-radius:3px; background:#e2e8f0; flex:1; max-width:80px; overflow:hidden; }
    .usage-bar-fill { height:100%; border-radius:3px; background:var(--primary); }

    /* ── Overview link in header ── */
    .header-overview-btn {
      padding: 5px 10px; border-radius: 7px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; background: transparent;
      color: var(--muted); transition: background .1s, color .1s;
    }
    .header-overview-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }

    /* ── Toast ── */
    .toasts { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
    .toast {
      padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.12); animation: slideUp .18s ease;
    }
    .toast-info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .toast-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .toast-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Spinner ── */
    .spin {
      display: inline-block; border-radius: 50%;
      border: 2px solid #e2e8f0; border-top-color: var(--primary);
      animation: rotate .6s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <img class="logo" src="/assets/raven.png" alt="DeepRaven" style="cursor:pointer" onclick="showHomeDashboard()">
  <h1 style="cursor:pointer" onclick="showHomeDashboard()">DeepRaven</h1>

      <span class="proj-picker-arrow">▾</span>

    <div class="proj-dropdown" id="proj-dropdown">
      <div id="proj-dd-items"><div style="padding:10px 14px;color:var(--muted);font-size:13px">Loading…</div></div>
      <div class="proj-dd-sep"></div>

<!-- ── Login screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="/assets/logo.png" alt="DeepRaven"></div>
    <h2 id="auth-title">Welcome back</h2>
    <p class="sub" id="auth-sub">Sign in to your account</p>
    <div id="name-group" class="form-group" style="display:none">
      <label>Full Name</label>
      <input type="text" id="name-input" placeholder="Your name">

    <div class="form-group">

    </div>

    <div class="form-group" id="otp-group" style="display:none">

      <input type="text" id="otp-input" placeholder="000000" maxlength="6"
             inputmode="numeric" autocomplete="one-time-code"
             style="letter-spacing:0.35em;text-align:center;font-size:22px;font-family:monospace;font-weight:700"
             onkeydown="if(event.key==='Enter')submitAuth()"
             oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<!-- ── App layout ── -->
<div id="app-layout">
  <!-- Sidebar: contacts + project nav -->
  <div id="sidebar">
    <div class="contacts-header">
      <div class="label" id="contacts-label">Contacts</div>
      <input class="search" type="text" placeholder="Search contacts…" oninput="filterContacts(this.value)">
    </div>
    <div class="contacts-list" id="contacts-list" style="flex:1;overflow-y:auto">
      <div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px">Select a project</div>
    </div>
    <!-- Project nav (shown when a project is selected) -->
    <div class="sidebar-proj-nav" id="sidebar-proj-nav" style="display:none">
      <div class="spn-label">Project</div>
      <div class="spn-item" id="spn-keys"        onclick="showProjectTab('keys')">🔑 API Keys</div>
      <div class="spn-item" id="spn-integration" onclick="showProjectTab('integration')">📋 Integration</div>
      <div class="spn-item" id="spn-settings"    onclick="showProjectTab('settings')">⚙ Settings</div>
    </div>
  </div>

  <!-- Main detail panel -->
  <main id="main">
    <div class="empty-state">
      <img src="/assets/logo.png" alt="DeepRaven">
      <p>Select a contact to view their profile</p>
    </div>
  </main>
</div>

<div class="toasts" id="toasts"></div>

<!-- ── Modal container ── -->
<div id="modal-container"></div>

<script>
  const API = '/api/v1';

  // ── State ─────────────────────────────────────────────────────────────────
  let jwt = localStorage.getItem('dr_jwt') || null;
  let refreshToken = localStorage.getItem('dr_refresh') || null;
  let accountEmail = localStorage.getItem('dr_email') || '';
  let isRegisterMode = false;
  let isForgotMode = false;
  let isResetMode = false;
  let isOtpMode = false;
  let otpEmail = '';
  let recoveryToken = null;
  let allProjects = [];
  let activeProjectId = null;
  let allContacts = [];
  let activeContactId = null;
  let activeTab = 'profile';

  // ── Auth headers ──────────────────────────────────────────────────────────
  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwt}` };
  }

  // ── Fetch with auto token refresh on 401 ──────────────────────────────────
  let _refreshing = null;
  async function apiFetch(url, opts = {}) {
    opts.headers = opts.headers || authHeaders();
    let res = await fetch(url, opts);
    if (res.status === 401 && refreshToken) {
      // Deduplicate concurrent refresh attempts
      if (!_refreshing) {
        _refreshing = fetch(`${API}/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh_token: refreshToken }),
        }).then(async r => {
          if (!r.ok) throw new Error('refresh failed');
          const d = await r.json();
          jwt = d.access_token;
          if (d.refresh_token) refreshToken = d.refresh_token;
          localStorage.setItem('dr_jwt', jwt);
          if (d.refresh_token) localStorage.setItem('dr_refresh', d.refresh_token);
        }).catch(() => {
          logout();
        }).finally(() => { _refreshing = null; });
      }
      await _refreshing;
      if (!jwt) return res; // logout was called
      opts.headers = authHeaders();
      res = await fetch(url, opts);
    }
    if (res.status === 401) { logout(); }
    return res;
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg, type = 'info', ms = 3500) {
    const el = Object.assign(document.createElement('div'), {
      className: `toast toast-${type}`, textContent: msg,
    });
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), ms);
  }

  // ── Time helpers ──────────────────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '—';
    const d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return 'just now';
    if (d < 3600) return `${Math.floor(d/60)}m ago`;
    if (d < 86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }
  function fmt(iso) { return iso ? new Date(iso).toLocaleString() : '—'; }
  function v(s) { return (s && s.trim()) ? s : null; }
  function spinner(sz = 14, bw = 2) {
    return `<span class="spin" style="width:${sz}px;height:${sz}px;border-width:${bw}px"></span>`;
  }

  // ── Auth mode toggle ──────────────────────────────────────────────────────
  function _resetAuthUI() {
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-ok').style.display = 'none';
    document.getElementById('password-input').value = '';
  }

  function toggleAuthMode() {
    isForgotMode = false;
    isRegisterMode = !isRegisterMode;
    document.getElementById('auth-title').textContent = isRegisterMode ? 'Create account' : 'Welcome back';
    document.getElementById('auth-sub').textContent = isRegisterMode ? 'Start your free account' : 'Sign in to your account';
    document.getElementById('auth-btn').textContent = isRegisterMode ? 'Create account' : 'Sign in';
    document.getElementById('name-group').style.display = isRegisterMode ? '' : 'none';
    document.getElementById('password-group').style.display = '';
    document.getElementById('forgot-link').style.display = isRegisterMode ? 'none' : '';
    document.getElementById('auth-switch-text').textContent = isRegisterMode ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('auth-switch-link').textContent = isRegisterMode ? 'Sign in' : 'Sign up';
    _resetAuthUI();
  }

  function toggleForgotMode() {
    isForgotMode = true;
    isRegisterMode = false;
    isResetMode = false;
    document.getElementById('auth-title').textContent = 'Reset password';
    document.getElementById('auth-sub').textContent = "Enter your email and we'll send a reset link.";
    document.getElementById('auth-btn').textContent = 'Send reset link';
    document.getElementById('name-group').style.display = 'none';
    document.getElementById('password-group').style.display = 'none';
    document.getElementById('confirm-password-group').style.display = 'none';
    document.getElementById('forgot-link').style.display = 'none';
    document.getElementById('auth-switch-text').textContent = 'Remember your password?';
    document.getElementById('auth-switch-link').textContent = 'Sign in';
    _resetAuthUI();
  }

  function toggleResetMode(token) {
    isResetMode = true;
    isForgotMode = false;
    isRegisterMode = false;
    recoveryToken = token;
    document.getElementById('auth-title').textContent = 'Set new password';
    document.getElementById('auth-sub').textContent = 'Enter your new password below.';
    document.getElementById('auth-btn').textContent = 'Update password';
    document.getElementById('name-group').style.display = 'none';
    document.getElementById('email-input').closest('.form-group').style.display = 'none';
    document.getElementById('password-group').style.display = '';
    document.getElementById('password-label').textContent = 'New Password';
    document.getElementById('confirm-password-group').style.display = '';
    document.getElementById('forgot-link').style.display = 'none';
    document.getElementById('auth-switch-row').style.display = 'none';
    _resetAuthUI();
    // Clean up the URL fragment so the token isn't visible
    history.replaceState(null, '', '/dashboard');
  }

  function toggleOtpMode(email) {
    isOtpMode = true;
    isRegisterMode = false;
    otpEmail = email;
    document.getElementById('auth-title').textContent = 'Check your email';
    document.getElementById('auth-sub').textContent = `We sent a 6-digit code to ${email}`;
    document.getElementById('auth-btn').textContent = 'Verify';
    document.getElementById('name-group').style.display = 'none';
    document.getElementById('email-input').closest('.form-group').style.display = 'none';
    document.getElementById('password-group').style.display = 'none';
    document.getElementById('confirm-password-group').style.display = 'none';
    document.getElementById('forgot-link').style.display = 'none';
    document.getElementById('otp-group').style.display = '';
    document.getElementById('auth-switch-row').style.display = 'none';
    document.getElementById('auth-resend-row').style.display = '';
    _resetAuthUI();
    setTimeout(() => document.getElementById('otp-input').focus(), 50);
  }

  async function resendOtp() {
    try {
      const res = await fetch(`${API}/auth/resend-otp`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: otpEmail }),
      });
      if (!res.ok && res.status !== 204) {
        const d = await res.json();
        throw new Error(d.detail || 'Failed to resend');
      }
      showAuthOk('Code resent! Check your inbox.');
    } catch(e) {
      showAuthError(e.message);
    }
  }

  async function submitAuth() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    const name = document.getElementById('name-input').value.trim();
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-ok').style.display = 'none';

    // ── OTP verification ──────────────────────────────────────────────────────
    if (isOtpMode) {
      const code = document.getElementById('otp-input').value.trim();
      if (!code || code.length !== 6) { showAuthError('Enter the 6-digit code from your email'); return; }
      const btn = document.getElementById('auth-btn');
      btn.disabled = true; btn.textContent = 'Verifying…';
      try {
        const res = await fetch(`${API}/auth/verify-otp`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: otpEmail, token: code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Invalid code');
        jwt = data.access_token;
        refreshToken = data.refresh_token || null;
        accountEmail = otpEmail;
        localStorage.setItem('dr_jwt', jwt);
        if (refreshToken) localStorage.setItem('dr_refresh', refreshToken);
        localStorage.setItem('dr_email', otpEmail);
        showApp();
      } catch(e) {
        showAuthError(e.message);
        btn.disabled = false; btn.textContent = 'Verify';
      }
      return;
    }

    // ── Set new password (recovery flow) ─────────────────────────────────────
    if (isResetMode) {
      if (!password) { showAuthError('Password is required'); return; }
      const confirmPw = document.getElementById('confirm-password-input').value;
      if (password !== confirmPw) { showAuthError('Passwords do not match'); return; }
      if (password.length < 6) { showAuthError('Password must be at least 6 characters'); return; }
      const btn = document.getElementById('auth-btn');
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        const res = await fetch(`${API}/auth/update-password`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ access_token: recoveryToken, password }),
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Password update failed'); }
        showAuthOk('Password updated! Signing you in…');
        // Use the recovery token as the session JWT and proceed
        jwt = recoveryToken;
        localStorage.setItem('dr_jwt', jwt);
        setTimeout(() => showApp(), 1500);
      } catch(e) {
        showAuthError(e.message);
        btn.disabled = false; btn.textContent = 'Update password';
      }
      return;
    }

    if (!email) { showAuthError('Email is required'); return; }
    if (!isForgotMode && !password) { showAuthError('Password is required'); return; }

    const btn = document.getElementById('auth-btn');
    btn.disabled = true;
    btn.textContent = isForgotMode ? 'Sending…' : isRegisterMode ? 'Creating…' : 'Signing in…';

    try {
      // ── Forgot password ───────────────────────────────────────────────────
      if (isForgotMode) {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email }),
        });
        if (!res.ok && res.status !== 204) throw new Error('Failed to send reset email');
        showAuthOk('Reset link sent! Check your inbox.');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
        return;
      }

      // ── Register / Login ──────────────────────────────────────────────────
      const endpoint = isRegisterMode ? `${API}/auth/register` : `${API}/auth/login`;
      const body = isRegisterMode
        ? { email, password, name: name || email }
        : { email, password };
      const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Authentication failed');

      if (isRegisterMode && !data.access_token) {
        // Email confirmation required — switch to OTP entry
        btn.disabled = false;
        toggleOtpMode(email);
        return;
      }

      jwt = data.access_token;
      refreshToken = data.refresh_token || null;
      accountEmail = email;
      localStorage.setItem('dr_jwt', jwt);
      if (refreshToken) localStorage.setItem('dr_refresh', refreshToken);
      localStorage.setItem('dr_email', email);
      showApp();
    } catch (e) {
      showAuthError(e.message);
      btn.disabled = false;
      btn.textContent = isForgotMode ? 'Send reset link' : isRegisterMode ? 'Create account' : 'Sign in';
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = '';
  }

  function showAuthOk(msg) {
    const el = document.getElementById('auth-ok');
    el.textContent = msg;
    el.style.display = '';
  }

  function logout() {
    jwt = null;
    refreshToken = null;
    localStorage.removeItem('dr_jwt');
    localStorage.removeItem('dr_refresh');
    localStorage.removeItem('dr_email');
    document.getElementById('app-layout').classList.remove('visible');
    document.getElementById('login-screen').style.display = '';
    document.getElementById('account-info').style.display = 'none';
    document.getElementById('proj-picker').style.display = 'none';
    activeProjectId = null;
    activeContactId = null;
    if (_homeChart) { _homeChart.destroy(); _homeChart = null; }
    // Reset auth form to normal login state
    isResetMode = false;
    isForgotMode = false;
    isRegisterMode = false;
    isOtpMode = false;
    otpEmail = '';
    recoveryToken = null;
    document.getElementById('auth-title').textContent = 'Welcome back';
    document.getElementById('auth-sub').textContent = 'Sign in to your account';
    document.getElementById('auth-btn').textContent = 'Sign in';
    document.getElementById('name-group').style.display = 'none';
    document.getElementById('email-input').closest('.form-group').style.display = '';
    document.getElementById('password-group').style.display = '';
    document.getElementById('password-label').textContent = 'Password';
    document.getElementById('confirm-password-group').style.display = 'none';
    document.getElementById('otp-group').style.display = 'none';
    document.getElementById('otp-input').value = '';
    document.getElementById('forgot-link').style.display = '';
    document.getElementById('auth-switch-row').style.display = '';
    document.getElementById('auth-resend-row').style.display = 'none';
    document.getElementById('auth-switch-text').textContent = "Don't have an account?";
    document.getElementById('auth-switch-link').textContent = 'Sign up';
    _resetAuthUI();
  }

  // ── App init ──────────────────────────────────────────────────────────────
  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-layout').classList.add('visible');
    document.getElementById('account-info').style.display = '';
    document.getElementById('proj-picker').style.display = '';
    document.getElementById('account-email').textContent = accountEmail;
    loadProjects();
    showHomeDashboard();
  }

  // ── Home dashboard ────────────────────────────────────────────────────────
  let _homeChart = null;

  async function showHomeDashboard() {
    activeProjectId = null;
    activeContactId = null;
    activeProjectTab = null;

    document.getElementById('proj-picker-label').textContent = 'Select a project';
    document.getElementById('contacts-label').textContent = 'Contacts';
    document.getElementById('contacts-list').innerHTML =
      '<div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px">Select a project</div>';
    document.getElementById('sidebar-proj-nav').style.display = 'none';
    renderProjects();

    // Render skeleton
    document.getElementById('main').innerHTML = `
      <div class="home-panel">
        <div class="home-title">Overview</div>
        <div class="home-sub">Welcome back, ${accountEmail}</div>
        <div class="stat-cards" id="stat-cards">${[1,2,3,4].map(()=>`
          <div class="stat-card">
            <div class="sc-label" style="background:#f1f5f9;width:60%;height:10px;border-radius:4px"></div>
            <div class="sc-value" style="background:#f1f5f9;width:40%;height:28px;border-radius:4px;margin-top:8px"></div>
          </div>`).join('')}
        </div>
        <div class="home-section">
          <div class="home-section-title">💬 Conversations — last 30 days</div>
          <div class="chart-card">
            <canvas id="convos-chart" height="90"></canvas>
          </div>
        </div>
        <div class="home-section">
          <div class="home-section-title">⚡ LLM Usage by Project</div>
          <div class="chart-card" style="padding:0;overflow:hidden">
            <div id="usage-table-wrap" style="padding:16px 22px">${spinner(20,2)}</div>
          </div>
        </div>
      </div>`;

    // Load all three in parallel
    try {
      const [stats, daily, usage] = await Promise.all([
        apiFetch(`${API}/stats/overview`,              { headers: authHeaders() }).then(r => r.json()),
        apiFetch(`${API}/stats/conversations/daily`,   { headers: authHeaders() }).then(r => r.json()),
        apiFetch(`${API}/stats/usage`,                 { headers: authHeaders() }).then(r => r.json()),
      ]);
      _renderStatCards(stats);
      _renderConvosChart(daily);
      _renderUsageTable(usage);
    } catch (e) {
      toast(`Failed to load overview: ${e.message}`, 'error');
    }
  }

  function _renderStatCards(stats) {
    const el = document.getElementById('stat-cards');
    if (!el) return;
    el.innerHTML = `
      <div class="stat-card sc-blue">
        <div class="sc-label">Projects</div>
        <div class="sc-value">${stats.projects ?? 0}</div>
        <div class="sc-sub">active projects</div>
      </div>
      <div class="stat-card sc-green">
        <div class="sc-label">Contacts</div>
        <div class="sc-value">${(stats.contacts ?? 0).toLocaleString()}</div>
        <div class="sc-sub">tracked contacts</div>
      </div>

        <div class="sc-value">${(stats.conversations ?? 0).toLocaleString()}</div>
        <div class="sc-sub">total ingested</div>
      </div>
      <div class="stat-card sc-purple">
        <div class="sc-label">LLM Tokens</div>
        <div class="sc-value">${_fmtTokens(stats.total_tokens ?? 0)}</div>
        <div class="sc-sub">tokens consumed</div>
      </div>`;

  function _fmtTokens(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
    return String(n);
  }

  function _renderConvosChart(daily) {
    const canvas = document.getElementById('convos-chart');
    if (!canvas) return;

    // Build full 30-day range, filling gaps with 0
    const today = new Date();
    const labels = [], data = [];
    const map = {};
    (daily || []).forEach(r => { map[r.date] = Number(r.count); });
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      labels.push(key.slice(5));   // MM-DD
      data.push(map[key] || 0);
    }

    if (_homeChart) { _homeChart.destroy(); _homeChart = null; }
    _homeChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Conversations',
          data,
          backgroundColor: 'rgba(99,102,241,.2)',
          borderColor: '#6366f1',
          borderWidth: 1.5,
          borderRadius: 3,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { font: { size: 10 }, maxRotation: 45 },
            grid:  { display: false },
          },
          y: {
            beginAtZero: true,
            ticks: { precision: 0, font: { size: 10 } },
            grid:  { color: '#f1f5f9' },
          },
        },
      },
    });
  }

  function _renderUsageTable(usage) {
    const el = document.getElementById('usage-table-wrap');
    if (!el) return;
    if (!usage || !usage.length) {
      el.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:6px 0">No LLM usage recorded yet. Usage is logged when profiles are extracted.</p>';
      return;
    }
    const maxTokens = Math.max(...usage.map(r => Number(r.total_tokens)), 1);
    el.innerHTML = `
      <table class="usage-table">
        <thead>
          <tr>
            <th>Project</th>
            <th>Calls</th>
            <th>Prompt</th>
            <th>Completion</th>
            <th>Total tokens</th>
          </tr>
        </thead>
        <tbody>
          ${usage.map(r => {
            const pct = Math.round((Number(r.total_tokens) / maxTokens) * 100);
            return `<tr>
              <td><span class="proj-name">${r.project_name}</span></td>
              <td>${Number(r.calls).toLocaleString()}</td>
              <td>${_fmtTokens(Number(r.prompt_tokens))}</td>
              <td>${_fmtTokens(Number(r.completion_tokens))}</td>
              <td>
                <div class="usage-bar-wrap">
                  <div class="usage-bar"><div class="usage-bar-fill" style="width:${pct}%"></div></div>
                  <span style="min-width:42px">${_fmtTokens(Number(r.total_tokens))}</span>

              </td>

          }).join('')}

  async function loadDetail(projectId, contactId) {
    try {
      const [pRes, cRes] = await Promise.all([
        apiFetch(`${API}/projects/${projectId}/contacts/${contactId}/profile`, { headers: authHeaders() }),
        apiFetch(`${API}/projects/${projectId}/contacts/${contactId}/conversations?limit=100`, { headers: authHeaders() }),
      ]);
      const profile = await pRes.json();
      const convos  = await cRes.json();
      const contact = allContacts.find(c => c.id === contactId) || {};
      renderDetail(projectId, contactId, profile, convos, contact);
    } catch (e) {
      toast(`Failed to load: ${e.message}`, 'error');
    }
  }

  function tags(arr) {
    if (!arr || !arr.length) return '<span class="fv empty">none yet</span>';
    return `<div class="tag-list">${arr.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;

  function row(label, value) {

    return `<div class="field"><span class="fl">${label}</span><span class="fv ${empty?'empty':''}">${v(value)||'—'}</span></div>`;
  }
  function colRow(label, content) {
    return `<div class="field col"><span class="fl">${label}</span>${content}</div>`;
  }
  function renderRelative(r) {
    const title = [r.relation, r.name].filter(Boolean).join(' — ');
    const attrs = [
      r.age    ? `Age ${r.age}`  : '',
      r.gender || '',
      ...(r.preferences || []),
    ].filter(Boolean).map(a => `<span class="relative-attr">${escHtml(a)}</span>`).join('');
    const sizeAttrs = Object.entries(r.sizes || {})
      .map(([k, v]) => `<span class="relative-attr size-attr">${escHtml(k)}: ${escHtml(v)}</span>`).join('');
    const notes = r.notes ? `<div class="relative-notes">${escHtml(r.notes)}</div>` : '';
    return `<div class="relative-item">
      <div class="relative-relation">${escHtml(title)}</div>
      <div class="relative-attrs">${attrs}${sizeAttrs}</div>
      ${notes}
    </div>`;
  }

  function profileTab(p) {
    const persona = p.sales && p.sales.buying_persona;
    const personaHtml = persona
      ? `<div class="persona-text">${escHtml(persona)}</div>`
      : `<div class="persona-empty">No buying persona yet — run extraction after conversations are added.</div>`;

    const relatives = p.relatives || [];
    const relativesCard = relatives.length ? `
      <div class="pcard">
        <div class="pcard-title">Relatives &amp; Family</div>
        ${relatives.map(renderRelative).join('')}
      </div>` : '';

    return `<div class="profile-grid">
      <div class="persona-card">
        <div class="persona-label">Buying Persona</div>
        ${personaHtml}
      </div>
      <div class="pcard">
        <div class="pcard-title">Personal</div>
        ${row('Name', p.personal.name)}
        ${row('Gender', p.personal.gender)}
        ${row('Phone', p.personal.phone)}
        ${row('Location', p.personal.location)}
        ${row('Company', p.personal.company)}
        ${row('Role', p.personal.role)}
        ${p.personal.delivery_address ? colRow('Delivery address', `<span style="font-size:12px;color:#cbd5e1">${p.personal.delivery_address}</span>`) : ''}
      </div>
      <div class="pcard">
        <div class="pcard-title">Preferences</div>
        ${row('Comm. style', p.preferences.communication_style)}
        ${row('Best channel', p.preferences.best_contact_channel)}
        ${colRow('Languages', tags(p.preferences.languages))}
      </div>
      ${relativesCard}
      <div class="pcard">
        <div class="pcard-title">Current Needs</div>
        ${colRow('', tags((p.sales && p.sales.current_needs) || []))}
      </div>
      <div class="pcard">
        <div class="pcard-title">Relationship</div>
        ${row('Status', p.relationship.status)}
        ${row('Last contact', p.relationship.last_contact_date)}
        ${colRow('Details', tags(p.relationship.personal_details))}
      </div>
      <div class="pcard">
        <div class="pcard-title">Sales Intelligence</div>
        ${colRow('Buying triggers', tags(p.sales.buying_triggers))}
        ${colRow('Pain points', tags(p.sales.pain_points))}
        ${colRow('Objections', tags(p.sales.objections_raised))}
        ${row('Budget', p.sales.budget_range)}
        ${(p.sales.purchase_history && p.sales.purchase_history.length) ? colRow('Purchase history', tags(p.sales.purchase_history)) : ''}
      </div>
      <div style="grid-column:1/-1;font-size:11px;color:#94a3b8;padding:2px 0">
        Created ${fmt(p.created_at)} · Updated ${fmt(p.updated_at)}
      </div>
      <div class="gdpr-section">
        <div class="gdpr-title">Data &amp; Privacy (GDPR)</div>
        <div class="gdpr-actions">
          <button class="btn-danger" onclick="gdprEraseConversations('${activeProjectId}','${activeContactId}')">Erase Conversations</button>
          <button class="btn-danger" onclick="gdprEraseProfile('${activeProjectId}','${activeContactId}')">Erase Profile Data</button>
          <button class="btn-danger destructive" onclick="gdprDeleteContact('${activeProjectId}','${activeContactId}')">Delete Contact</button>
        </div>
      </div>
    </div>`;
  }

  // ── Conversations tab ─────────────────────────────────────────────────────
  function conversationsTab(convos) {
    if (!convos.length)
      return '<div style="text-align:center;padding:48px;color:#94a3b8">No conversations yet</div>';
    return [...convos].reverse().map(rec => {
      const processed = rec.processed;
      const statusBadge = processed
        ? '<span class="badge b-green">✓ Processed</span>'
        : '<span class="badge b-amber">⏳ Pending extraction</span>';
      const msgStatus = processed
        ? '<span class="msg-status msg-status-ok">✓ in profile</span>'
        : '<span class="msg-status msg-status-pending">⏳ pending</span>';
      const msgs = rec.messages.map(m => {
        const cls = `msg-${m.role.toLowerCase()}`;
        return `<div class="msg ${cls}">
          <div class="msg-role">${m.role}</div>
          ${m.content}
          <div>${msgStatus}</div>
        </div>`;
      }).join('');
      const pendingFooter = processed ? '' : `
        <div class="convo-pending">
          ⏳ Not yet extracted into the profile — will be processed automatically
        </div>`;
      return `<div class="convo-card ${processed ? 'is-processed' : 'is-unprocessed'}">
        <div class="convo-header">
          <span>${fmt(rec.timestamp)}</span>
          <span>${rec.messages.length} msg${rec.messages.length !== 1 ? 's' : ''}</span>
          <span class="spacer"></span>
          ${statusBadge}
        </div>
        <div class="convo-msgs">${msgs}</div>
        ${pendingFooter}
      </div>`;
    }).join('');
  }

  // ── Extract ───────────────────────────────────────────────────────────────
  async function runExtract(projectId, contactId, force) {
    toast(force ? 'Force re-extracting…' : 'Extracting new conversations…', 'info');
    try {
      const res = await apiFetch(
        `${API}/projects/${projectId}/contacts/${contactId}/profile/extract/sync?force=${force}`,
        { method: 'POST', headers: authHeaders() }
      );
      if (res.status === 404) { toast('No conversations to process', 'error'); return; }
      if (res.status === 409) { toast('Extraction already running', 'error'); return; }
      if (!res.ok) throw new Error(await res.text());
      toast('Extraction completed!', 'success');
      await Promise.all([loadContacts(projectId), loadDetail(projectId, contactId)]);
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  // ── Export helpers ────────────────────────────────────────────────────────
  async function _downloadFromApi(url, defaultFilename) {
    const res = await apiFetch(url, { headers: authHeaders() });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="([^"]+)"/);
    const filename = match ? match[1] : defaultFilename;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function exportContactProfile(projectId, contactId) {
    try {
      await _downloadFromApi(
        `${API}/projects/${projectId}/contacts/${contactId}/profile/export`,
        'profile.json'
      );
      toast('Profile exported', 'success');
    } catch (e) {
      toast(`Export failed: ${e.message}`, 'error');
    }
  }

  async function exportAllProfiles(projectId) {
    toast('Preparing export…', 'info');
    try {
      await _downloadFromApi(
        `${API}/projects/${projectId}/profiles/export`,
        'profiles.json'
      );
      toast('All profiles exported', 'success');
    } catch (e) {
      toast(`Export failed: ${e.message}`, 'error');
    }
  }

  // ── GDPR ─────────────────────────────────────────────────────────────────
  async function gdprEraseConversations(projectId, contactId) {
    if (!confirm('Erase all conversation history for this contact? This cannot be undone.')) return;
    try {
      const res = await apiFetch(`${API}/projects/${projectId}/contacts/${contactId}/conversations`,
        { method: 'DELETE', headers: authHeaders() });
      if (!res.ok) throw new Error(await res.text());
      toast('Conversation history erased', 'success');
      await Promise.all([loadContacts(projectId), loadDetail(projectId, contactId)]);
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  async function compressProfile(projectId, contactId) {
    try {
      const res = await apiFetch(`/projects/${projectId}/contacts/${contactId}/profile/compress`, { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      showToast('Profile compressed');
      await loadContact(projectId, contactId);
    } catch (e) { showToast('Compress failed: ' + e.message, true); }
  }

  async function gdprEraseProfile(projectId, contactId) {
    if (!confirm('Erase all extracted profile data for this contact? This cannot be undone.')) return;
    try {
      const res = await apiFetch(`${API}/projects/${projectId}/contacts/${contactId}/profile`,
        { method: 'DELETE', headers: authHeaders() });
      if (!res.ok) throw new Error(await res.text());
      toast('Profile data erased', 'success');
      await loadDetail(projectId, contactId);
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  async function gdprDeleteContact(projectId, contactId) {
    if (!confirm('Permanently delete this contact and ALL their data? This cannot be undone.')) return;
    if (!confirm('Are you sure? This will delete conversations, profile, and the contact record.')) return;
    try {
      const res = await apiFetch(`${API}/projects/${projectId}/contacts/${contactId}/contact`,
        { method: 'DELETE', headers: authHeaders() });
      if (!res.ok) throw new Error(await res.text());
      toast('Contact deleted', 'success');
      activeContactId = null;
      document.getElementById('main').innerHTML = '<div class="empty-state">Select a contact</div>';
      await loadContacts(projectId);
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  // ── Utility helpers ───────────────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.background = 'var(--primary)';
      btn.style.color = 'white';
      btn.style.borderColor = 'var(--primary)';
      setTimeout(() => {
        btn.textContent = orig;
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 1600);
    }).catch(() => toast('Copy failed — please copy manually', 'error'));
  }

  function switchSnippetLang(lang) {
    window._activeSnippetLang = lang;
    ['curl','python','node'].forEach(l => {
      const el = document.getElementById(`stab-${l}`);
      if (el) el.classList.toggle('active', l === lang);
    });
    const s = window._integrationSnippets[lang];
    if (s) {
      const sendEl = document.getElementById('snippet-send');
      const getEl  = document.getElementById('snippet-get');
      if (sendEl) sendEl.textContent = s.send;
      if (getEl)  getEl.textContent  = s.get;
    }
  }

  // ── New Project modal ─────────────────────────────────────────────────────
  function openNewProjectModal() {
    showModal(`
      <h3>New Project</h3>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="m-proj-name" placeholder="e.g. Sales Team EU" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" id="m-proj-desc" placeholder="What is this project for?" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none">
      </div>
      <div class="modal-actions">
        <button class="btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn-sm primary" onclick="createProject()">Create Project</button>
      </div>
    `);
    setTimeout(() => document.getElementById('m-proj-name').focus(), 50);
  }

  async function createProject() {
    const name = document.getElementById('m-proj-name').value.trim();
    const desc = document.getElementById('m-proj-desc').value.trim();
    if (!name) { toast('Project name is required', 'error'); return; }
    try {
      const res = await apiFetch(`${API}/projects`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name, description: desc || null }),
      });
      if (!res.ok) throw new Error(await res.text());
      closeModal();
      toast('Project created!', 'success');
      await loadProjects();
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  async function renameProject(projectId) {
    const inputEl = document.getElementById('ps-rename') || document.getElementById('m-rename-input');
    const name = inputEl ? inputEl.value.trim() : '';
    if (!name) return;
    try {
      const res = await apiFetch(`${API}/projects/${projectId}`, {
        method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ name }),
      });
      if (!res.ok) throw new Error(await res.text());
      toast('Project renamed', 'success');
      await loadProjects();
      if (activeProjectId === projectId) {
        document.getElementById('proj-picker-label').textContent = name;
      }
      const titleEl = document.querySelector('.po-title');
      if (titleEl) titleEl.textContent = name;
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  async function deleteProject(projectId) {
    if (!confirm('Delete this project and ALL its data? This cannot be undone.')) return;
    try {
      const res = await apiFetch(`${API}/projects/${projectId}`, {
        method: 'DELETE', headers: authHeaders(),
      });
      if (!res.ok) throw new Error(await res.text());
      toast('Project deleted', 'success');
      allContacts = [];
      await loadProjects();
      showHomeDashboard();
    } catch (e) {
      toast(`Failed: ${e.message}`, 'error');
    }
  }

  // ── Modal helpers ─────────────────────────────────────────────────────────
  function showModal(html) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'active-modal';
    overlay.onclick = e => { if (e.target === overlay) closeModal(); };
    overlay.innerHTML = `<div class="modal">${html}</div>`;
    document.getElementById('modal-container').appendChild(overlay);
  }

  function closeModal() {
    const el = document.getElementById('active-modal');
    if (el) el.remove();
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  (function() {
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const hashType   = hashParams.get('type');
    const hashToken  = hashParams.get('access_token');

    if (hashType === 'recovery' && hashToken) {
      // Password reset link was clicked — show the set-new-password form
      toggleResetMode(hashToken);
    } else if (jwt) {
      showApp();
    } else if (new URLSearchParams(window.location.search).get('confirmed') === '1') {
      showAuthOk('Email confirmed! You can now sign in.');
      history.replaceState(null, '', '/dashboard');
    }
  })();
</script>
