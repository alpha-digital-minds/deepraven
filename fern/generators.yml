api:
  specs:
    - openapi: openapi/openapi.json

default-group: local
groups:
  local:
    generators:
      - name: fernapi/fern-python-sdk
        version: latest
        output:
          location: local-file-system
          path: ../sdks/python
        config:
          package_name: deepraven

      - name: fernapi/fern-typescript-node-sdk
        version: latest
        output:
          location: local-file-system
          path: ../sdks/typescript
        config:
          package_name: deepraven
